<!doctype html>
<html lang="en">
  <head>
    <title>Product Management App Task</title>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/angular.js/1.8.3/angular.min.js"
      integrity="sha512-KZmyTq3PLx9EZl0RHShHQuXtrvdJ+m35tuOiwlcZfs/rE7NZv29ygNA8SFCkMXTnYZQK2OX0Gm2qKGfvWEtRXA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body ng-app="MyApp" ng-controller="MyController">
    <main class="container mt-5">
      <div class="card shadow-lg rounded-4 p-4 col-lg-8 mx-auto">
        <h3 class="mb-4 text-center fw-bold">Product Management</h3>

        <div class="row g-2 mb-3 align-items-end">
          <div class="col-md-4">
            <input
              type="text"
              ng-model="newProduct.name"
              placeholder="Product Name"
              class="form-control form-control-sm"
            />
          </div>

          <div class="col-md-3">
            <input
              type="number"
              ng-model="newProduct.price"
              placeholder="Product Price"
              class="form-control form-control-sm"
              min="0"
            />
          </div>

          <div class="col-md-3">
            <input
              type="text"
              ng-model="newProduct.brand"
              placeholder="Product Brand"
              class="form-control form-control-sm"
            />
          </div>

          <div class="col-md-2 d-grid">
            <button
              class="btn btn-primary btn-sm"
              ng-click="addProduct()"
              ng-disabled="loading || !newProduct.name || newProduct.price==null || !newProduct.brand"
            >
              Add
            </button>
          </div>
        </div>

        <div class="text-center my-4" ng-if="loading">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
          </div>
        </div>

        <div
          ng-if="!loading && products.length==0"
          class="text-center text-danger fw-semibold fs-5 mt-2"
        >
          No Products Found!
        </div>

        <div class="table-responsive" ng-if="!loading && products.length > 0">
          <table class="table table-hover align-middle text-center">
            <thead class="table-dark">
              <tr>
                <th style="width: 8%">#</th>
                <th style="width: 30%">Name</th>
                <th style="width: 15%">Price</th>
                <th style="width: 15%">Brand</th>
                <th style="width: 30%">Edit Name</th>
                <th style="width: 10%">Remove</th>
              </tr>
            </thead>

            <tbody>
              <tr
                ng-repeat="product in products | orderBy:'id' track by product.id "
              >
                <th scope="row" class="fw-semibold">{{product.id}}</th>

                <td class="fw-medium">{{product.name}}</td>

                <td class="text-success fw-semibold">
                  {{product.price | currency:"EGP "}}
                </td>

                <td>
                  <span class="badge bg-secondary px-3 py-2"
                    >{{product.brand | uppercase}}</span
                  >
                </td>

                <td class="text-center">
                  <div ng-if="!product.isEditing">
                    <button
                      class="btn btn-warning btn-sm"
                      ng-click="editProduct(product)"
                    >
                      Edit
                    </button>
                  </div>

                  <div
                    ng-if="product.isEditing"
                    class="d-flex gap-2 justify-content-center align-items-center"
                  >
                    <input
                      type="text"
                      class="form-control form-control-md"
                      ng-model="product.tempName"
                      style="min-width: 180px; font-size: 14px"
                    />
                    <button
                      class="btn btn-light btn-sm fs-5"
                      ng-click="saveEdit(product)"
                    >
                      ✅
                    </button>
                    <button
                      class="btn btn-light btn-sm fs-5"
                      ng-click="cancelEdit(product)"
                    >
                      ❌
                    </button>
                  </div>
                </td>

                <td>
                  <button
                    class="btn btn-danger btn-sm"
                    ng-click="deleteProduct(product.id)"
                  >
                    x
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
    <script src="app.js"></script>
  </body>
</html>
